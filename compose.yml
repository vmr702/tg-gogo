services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/var/www
    environment:
      - DB_HOST=db
      - DB_NAME=gogo_db
      - DB_USER=user_name
      - DB_PASSWORD=user_password
    ports:
      - "8080:8080" # Откроем порт для проверки Slim в браузере

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=gogo_db
      - POSTGRES_USER=user_name
      - POSTGRES_PASSWORD=user_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
